# Square configuration Syntax.
version: v0.1

kubeconfig: /path/to/kubeconfig # eg "~/.kube/config".
kubecontext: null
folder: some/path

connection_parameters:
  disable_x509_strict: true
  k8s_extra_headers:
    foo: bar

# -----------------------------------------------------------------------------
# The order in which to save and apply K8s resources.
#
# If Square encounters a resource not on this list it will apply them last.
# -----------------------------------------------------------------------------
priorities:
  # Custom Resources should come first.
  - CustomResourceDefinition

  # Common non-namespaced resources.
  - ClusterRole
  - ClusterRoleBinding

  # Namespaces must come before any namespaced resources.
  - Namespace

  # RBAC.
  - Role
  - RoleBinding
  - ServiceAccount

  # Everything else.
  - ConfigMap
  - Service
  - Deployment
  - HorizontalPodAutoscaler
  - Ingress

# -----------------------------------------------------------------------------
# The resource Square should target.
#
# Square will ignore a resources unless all selectors apply to it.
# -----------------------------------------------------------------------------
selectors:
  kinds:
    - ClusterRole
    - ClusterRoleBinding
    - ConfigMap
    - CustomResourceDefinition
    - Deployment
    - HorizontalPodAutoscaler
    - Ingress
    - Namespace
    - Role
    - RoleBinding
    - Service
    - ServiceAccount
  namespaces: ["default", "kube-system"]
  labels:
    - app=square


# -----------------------------------------------------------------------------
# The layout of the manifest folder (see `folder` option above).
#
# GET will create a folder hierachy by name, app label and resource kind.
# -----------------------------------------------------------------------------
groupby:
  label: app
  order: [ns, label, kind]


# -----------------------------------------------------------------------------
# Define the manifest keys Square should ignore.
# -----------------------------------------------------------------------------
filters:
  # These apply to all manifests.
  _common_:
    - metadata:
      - annotations:
        - deployment.kubernetes.io/revision
        - kubectl.kubernetes.io/last-applied-configuration
        - kubernetes.io/change-cause
        - autoscaling.alpha.kubernetes.io/conditions
      - creationTimestamp
      - generation
      - resourceVersion
      - selfLink
      - uid
    - status

  ConfigMap:
    - metadata:
      - annotations
      - control-plane.alpha.kubernetes.io/leader
  Deployment: []
  HorizontalPodAutoscaler:
    - metadata:
      - annotations:
        - autoscaling.alpha.kubernetes.io/conditions
        - autoscaling.alpha.kubernetes.io/current-metrics
        - control-plane.alpha.kubernetes.io/leader
  Service:
    - spec:
      - ports:
        - nodePort

filters2:
  # --- These will be inserted into all resource types to reduce boiler plate. ---
  _common_:
    - metadata.annotations["autoscaling.alpha.kubernetes.io/conditions"]
    - metadata.annotations["deployment.kubernetes.io/revision"]
    - metadata.annotations["kubectl.kubernetes.io/last-applied-configuration"]
    - metadata.annotations["kubernetes.io/change-cause"]
    - metadata.creationTimestamp
    - metadata.generation
    - metadata.managedFields
    - metadata.resourceVersion
    - metadata.selfLink
    - metadata.uid
    - status

  # --- Individual resource types. ---
  configmap:
    - metadata.annotations

  deployment.apps: []

  horizontalpodautoscaler.autoscaling:
    - metadata.annotations["autoscaling.alpha.kubernetes.io/conditions"]
    - metadata.annotations["autoscaling.alpha.kubernetes.io/current-metrics"]
    - metadata.annotations["control-plane.alpha.kubernetes.io/leader"]

  service:
    - spec.clusterIP
    - spec.ports[*].nodePort
    - spec.sessionAffinity
